{% extends "base.html" %}

{% block title %}Data Cleaner{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">🧹 Data Cleaner <span class="badge bg-secondary fs-6">Limpieza de Datos</span></h2>
    
    <div class="row">
        <!-- INPUT -->
        <div class="col-md-5">
            <div class="card shadow-sm p-4 border-0 h-100">
                <h5 class="text-primary mb-3">Entrada de Datos</h5>
                <p class="small text-muted">Pega listas sucias de Excel, textos con emails o URLs mezcladas.</p>
                
                <textarea id="inputData" class="form-control mb-3 font-monospace small" rows="12" placeholder="Ejemplo:
https://web.com?utm=123
https://web.com (Duplicado)
texto con email info@web.com..."></textarea>
                
                <label class="fw-bold mb-2">Operación:</label>
                <select id="mode" class="form-select mb-3">
                    <option value="deduplicate">Eliminar Duplicados</option>
                    <option value="extract_urls">Extraer URLs de Texto</option>
                    <option value="clean_params">Limpiar Parámetros URL (?utm...)</option>
                    <option value="extract_domains">Extraer Solo Dominios</option>
                    <option value="extract_emails">Extraer Emails</option>
                    <option value="lowercase">Convertir a Minúsculas</option>
                </select>
                
                <button class="btn btn-dark w-100 fw-bold" onclick="runClean()">✨ Procesar Datos</button>
            </div>
        </div>
        
        <!-- OUTPUT -->
        <div class="col-md-7">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    <span class="fw-bold">Resultado: <span id="count" class="badge bg-white text-success">0</span> líneas</span>
                    <button class="btn btn-sm btn-light text-success fw-bold" onclick="copyRes()">📋 Copiar Resultado</button>
                </div>
                <div class="card-body p-0">
                    <textarea id="outputData" class="form-control border-0 h-100 font-monospace small bg-light" style="resize:none;" readonly></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function runClean(){
    const txt = document.getElementById('inputData').value;
    const mode = document.getElementById('mode').value;
    
    if(!txt.trim()) return alert("Pega algún dato primero.");
    
    // Feedback visual rápido
    document.getElementById('outputData').value = "Procesando...";
    
    fetch('/api/v1/cleaner/process', {
        method: 'POST', 
        headers: {'Content-Type': 'application/json'}, 
        body: JSON.stringify({text: txt, mode: mode})
    })
    .then(r => r.json())
    .then(d => {
        document.getElementById('outputData').value = d.data;
        document.getElementById('count').innerText = d.count;
    })
    .catch(e => alert("Error: " + e));
}

function copyRes(){
    const el = document.getElementById('outputData');
    el.select();
    document.execCommand('copy');
    alert('¡Datos copiados al portapapeles!');
}
</script>
{% endblock %}
