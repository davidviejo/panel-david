{% extends "base.html" %}
{% block title %}Discovery{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">💡 Keyword Discovery</h2>
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm p-4 border-0 h-100">
                <label class="fw-bold">Semilla:</label>
                <input type="text" id="seedInput" class="form-control mb-3" placeholder="Ej: seo">
                <label>Modo:</label>
                <select id="mode" class="form-select mb-3">
                    <option value="basic">Básico</option>
                    <option value="alpha">Alfabeto (A-Z)</option>
                    <option value="questions">Preguntas</option>
                </select>
                <button class="btn btn-warning w-100 fw-bold" onclick="runMining()">Minar Keywords</button>
            </div>
        </div>
        <div class="col-md-8">
            <div id="loading" style="display:none;" class="text-center py-5"><div class="spinner-border text-warning"></div></div>
            <div id="resultsArea" style="display:none;">
                <h5>Resultados: <span id="countBadge">0</span></h5>
                <textarea id="outputBox" class="form-control" rows="15"></textarea>
            </div>
        </div>
    </div>
</div>
<script>
function runMining(){
    const seed = document.getElementById('seedInput').value;
    const mode = document.getElementById('mode').value;
    document.getElementById('loading').style.display='block';
    document.getElementById('resultsArea').style.display='none';
    fetch('/api/v1/suggest/mine', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({seed:seed, mode:mode})})
    .then(r=>r.json()).then(d=>{
        document.getElementById('loading').style.display='none';
        document.getElementById('countBadge').innerText = d.count;
        document.getElementById('outputBox').value = d.keywords.join('\n');
        document.getElementById('resultsArea').style.display='block';
    });
}
</script>
{% endblock %}
