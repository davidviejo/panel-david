{% extends "base.html" %}
{% block title %}Sculpting{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🗿 Link Sculpting</h2>
    <textarea id="u" class="form-control mb-2" rows="10"></textarea>
    <button onclick="run()" class="btn btn-secondary w-100">Analizar</button>
    <div id="res" class="mt-3"></div>
</div>
<script>
let cd=[];
function run(){
    const u = document.getElementById('u').value.split('\n');
    fetch('/api/v1/sculpting/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls:u})})
    .then(r=>r.json()).then(d=>{
        cd=d.data;
        let h='<table class="table"><tr><th>URL</th><th>Int</th><th>Ext</th><th>Total</th></tr>';
        d.data.forEach(r=>{ h+=`<tr><td>${r.url}</td><td>${r.int}</td><td>${r.ext}</td><td>${r.total}</td></tr>` });
        document.getElementById('res').innerHTML=h+'</table>';
    });
}
</script>
{% endblock %}
