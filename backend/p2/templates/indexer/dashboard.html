{% extends "base.html" %}
{% block title %}Indexer{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🔍 Bulk Index Checker</h2>
    <div class="row">
        <div class="col-4">
            <textarea id="u" class="form-control mb-2" rows="8" placeholder="URLs..."></textarea>
            <select id="m" class="form-select mb-2">
                <option value="ddg">DuckDuckGo</option>
                <option value="google_api_official">Google API</option>
                <option value="google_scraping">Google Scraping</option>
            </select>
            
            <div id="apiBox" style="display:none"><input id="k" class="form-control mb-1" placeholder="Key"><input id="c" class="form-control mb-1" placeholder="CX"></div>
            <input id="d" type="number" class="form-control mb-2" value="3" placeholder="Delay">
            
            <button onclick="run()" class="btn btn-primary w-100">Check</button>
        </div>
        <div class="col-8"><div id="res"></div></div>
    </div>
</div>
<script>
document.getElementById('m').addEventListener('change', e=>{ document.getElementById('apiBox').style.display = e.target.value.includes('api')?'block':'none'; });
function run(){
    document.getElementById('res').innerHTML = 'Checking...';
    fetch('/api/v1/indexer/check', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({
        urls:document.getElementById('u').value.split('\n'), mode:document.getElementById('m').value,
        delay:document.getElementById('d').value, cse_key:document.getElementById('k').value, cse_cx:document.getElementById('c').value
    })}).then(r=>r.json()).then(d=>{
        let h='<table class="table"><tr><th>URL</th><th>Indexada?</th></tr>';
        d.data.forEach(i=>{ h+=`<tr><td>${i.url}</td><td><span class="badge ${i.indexed?'bg-success':'bg-danger'}">${i.indexed?'SI':'NO'}</span></td></tr>`; });
        document.getElementById('res').innerHTML=h+'</table>';
    });
}
</script>
{% endblock %}
