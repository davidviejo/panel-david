{% extends "base.html" %}
{% block title %}CTR{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🔥 CTR Magnet</h2>
    <textarea id="t" class="form-control mb-2" rows="5" placeholder="Ideas de título..."></textarea>
    <button onclick="run()" class="btn btn-danger">Analizar</button>
    <div id="res" class="mt-3"></div>
</div>
<script>
function run(){
    fetch('/api/v1/ctr/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({titles:document.getElementById('t').value})})
    .then(r=>r.json()).then(d=>{
        let h='';
        d.data.forEach(r=>{
            h+=`<div class="card mb-2 p-2 d-flex flex-row justify-content-between align-items-center">
                <b>${r.title}</b>
                <span class="badge bg-${r.score>70?'success':'warning'}">${r.score}</span>
            </div>`;
        });
        document.getElementById('res').innerHTML=h;
    });
}
</script>
{% endblock %}
