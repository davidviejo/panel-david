{% extends "base.html" %}
{% block title %}Intent{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🛒 Intent Classifier</h2>
    <textarea id="u" class="form-control mb-2" rows="10"></textarea>
    <button onclick="run()" class="btn btn-warning">Clasificar</button>
    <div id="res" class="mt-3"></div>
</div>
<script>
function run(){
    fetch('/api/v1/intent/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls:document.getElementById('u').value.split('\n')})})
    .then(r=>r.json()).then(d=>{
        let h='<ul class="list-group">';
        d.data.forEach(i=>{ h+=`<li class="list-group-item"><b>${i.type}</b> - ${i.url}</li>`; });
        document.getElementById('res').innerHTML=h+'</ul>';
    });
}
</script>
{% endblock %}
