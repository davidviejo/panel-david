{% extends "base.html" %}
{% block title %}Ratio{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🔢 Code/Text Ratio</h2>
    <textarea id="u" class="form-control mb-2" rows="5"></textarea>
    <button onclick="run()" class="btn btn-dark">Calcular</button>
    <div id="res" class="mt-3 table-responsive"><table class="table table-sm"><tbody id="tb"></tbody></table></div>
</div>
<script>
function run(){
    const u = document.getElementById('u').value.split('\n');
    fetch('/api/v1/ratio/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls:u})})
    .then(r=>r.json()).then(d=>{
        let h = '<thead><tr><th>URL</th><th>Ratio</th></tr></thead>';
        d.data.forEach(i=>{
            let c = i.ratio < 10 ? 'bg-danger' : 'bg-success';
            h += `<tr><td>${i.url}</td><td><span class="badge ${c}">${i.ratio}%</span></td></tr>`;
        });
        document.getElementById('tb').innerHTML = h;
    });
}
</script>
{% endblock %}
