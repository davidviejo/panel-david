{% extends "base.html" %}
{% block title %}Structure{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🗺️ Header Map</h2>
    <textarea id="u" class="form-control mb-2" placeholder="URLs..."></textarea>
    <button onclick="run()" class="btn btn-primary">Comparar</button>
    <div id="res" class="d-flex gap-3 overflow-auto mt-3 pb-3"></div>
</div>
<script>
function run(){
    const u = document.getElementById('u').value.split('\n');
    fetch('/api/v1/structure/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls:u})})
    .then(r=>r.json()).then(d=>{
        let h = '';
        d.data.forEach(i=>{
            let list = i.headers.map(x=>`<div class="small border-bottom ps-${x.tag=='H1'?0:(x.tag=='H2'?2:4)}"><b>${x.tag}</b> ${x.txt}</div>`).join('');
            h += `<div class="card" style="min-width:300px"><div class="card-header text-truncate">${i.url}</div><div class="card-body p-1" style="max-height:500px;overflow:auto">${list}</div></div>`;
        });
        document.getElementById('res').innerHTML = h;
    });
}
</script>
{% endblock %}
