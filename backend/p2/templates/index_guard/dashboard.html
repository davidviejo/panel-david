{% extends "base.html" %}
{% block title %}Index Guard{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">🔍 Indexability Guard</h2>
    <div class="row">
        <div class="col-4"><textarea id="u" class="form-control mb-3" rows="10"></textarea><button onclick="run()" class="btn btn-dark w-100">Verificar</button></div>
        <div class="col-8"><div id="res"></div></div>
    </div>
</div>
<script>
function run(){
    const u = document.getElementById('u').value.split('\n');
    fetch('/api/v1/index_guard/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls:u})})
    .then(r=>r.json()).then(d=>{
        let h = '<table class="table table-sm"><tr><th>URL</th><th>Indexable</th><th>Canonical</th><th>Robots</th></tr>';
        d.data.forEach(r=>{
            let c = r.is_indexable?'bg-success':'bg-danger';
            h += `<tr><td>${r.url}</td><td><span class="badge ${c}">${r.is_indexable}</span></td><td>${r.canonical_status}</td><td>${r.robots}</td></tr>`;
        });
        document.getElementById('res').innerHTML=h+'</table>';
    });
}
</script>
{% endblock %}
