{% extends "base.html" %}
{% block title %}Expired{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🗑️ Expired Hunter</h2>
    <textarea id="u" class="form-control mb-2" rows="5" placeholder="URLs semilla..."></textarea>
    <button onclick="run()" class="btn btn-danger">Escanear Enlaces</button>
    <div id="res" class="mt-3"></div>
</div>
<script>
function run(){
    const u = document.getElementById('u').value.split('\n');
    fetch('/api/v1/expired/scan', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls:u})})
    .then(r=>r.json()).then(d=>{
        let h = '';
        d.data.forEach(i=>{
            if(i.found.length>0) h += `<div class="alert alert-success">En <b>${i.url}</b>: ${i.found.join(', ')}</div>`;
        });
        document.getElementById('res').innerHTML=h || 'Nada encontrado';
    });
}
</script>
{% endblock %}
