{% extends "base.html" %}
{% block title %}Depth{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>📉 Click Depth</h2>
    <div class="row">
        <div class="col-3">
            <input id="u" class="form-control mb-2" placeholder="Home URL">
            <select id="d" class="form-select mb-2"><option value="3">Depth 3</option></select>
            <input id="l" class="form-control mb-2" value="100" placeholder="Limit">
            <button onclick="run()" class="btn btn-primary w-100">Calc</button>
        </div>
        <div class="col-9">
            <div class="row text-center mb-2"><div class="col bg-light">Home: <b id="s0">0</b></div><div class="col bg-success text-white">L1: <b id="s1">0</b></div><div class="col bg-info">L2: <b id="s2">0</b></div><div class="col bg-danger text-white">L3+: <b id="s3">0</b></div></div>
            <div id="res" style="max-height:500px;overflow:auto;"></div>
        </div>
    </div>
</div>
<script>
let cd=[];
function run(){
    fetch('/api/v1/depth/run', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:document.getElementById('u').value, max_depth:document.getElementById('d').value, limit:document.getElementById('l').value})})
    .then(r=>r.json()).then(d=>{
        cd=d.data;
        document.getElementById('s0').innerText=d.stats.d0; document.getElementById('s1').innerText=d.stats.d1; document.getElementById('s2').innerText=d.stats.d2; document.getElementById('s3').innerText=d.stats.d3;
        let h='<table class="table table-sm"><tr><th>Depth</th><th>URL</th></tr>';
        d.data.sort((a,b)=>a.depth-b.depth).forEach(r=>{h+=`<tr><td>${r.depth}</td><td>${r.url}</td></tr>`});
        document.getElementById('res').innerHTML=h+'</table>';
    });
}
</script>
{% endblock %}
