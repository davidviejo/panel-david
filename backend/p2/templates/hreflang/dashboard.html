{% extends "base.html" %}
{% block title %}Hreflang{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🌍 Hreflang Auditor</h2>
    <textarea id="u" class="form-control mb-3" rows="5" placeholder="URLs multidioma..."></textarea>
    <button onclick="run()" class="btn btn-primary">Check Tags</button>
    <div id="res" class="mt-3 row"></div>
</div>
<script>
function run(){
    const u = document.getElementById('u').value.split('\n');
    fetch('/api/v1/hreflang/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls:u})})
    .then(r=>r.json()).then(d=>{
        let h = '';
        d.data.forEach(i=>{
            let tags = i.tags.map(t=>`<div><span class="badge bg-secondary">${t.lang}</span> <small>${t.url}</small></div>`).join('');
            h += `<div class="col-md-12 mb-2"><div class="card p-3 border-0 shadow-sm"><h6>${i.url}</h6>${tags || '<span class="text-danger">Sin etiquetas hreflang</span>'}</div></div>`;
        });
        document.getElementById('res').innerHTML=h;
    });
}
</script>
{% endblock %}
