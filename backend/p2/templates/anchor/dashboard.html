{% extends "base.html" %}
{% block title %}Anchors{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>⚓ Anchor Auditor</h2>
    <textarea id="u" class="form-control mb-2" rows="10"></textarea>
    <button onclick="run()" class="btn btn-dark w-100">Scan</button>
    <div id="res" class="mt-3"></div>
</div>
<script>
let cd=[];
function run(){
    const u = document.getElementById('u').value.split('\n');
    fetch('/api/v1/anchor/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls:u})})
    .then(r=>r.json()).then(d=>{
        cd=d.data;
        let h='<table class="table"><tr><th>Target</th><th>Inlinks</th><th>Top Anchors</th></tr>';
        d.data.forEach(r=>{ h+=`<tr><td>${r.url}</td><td>${r.total}</td><td>${r.top}</td></tr>` });
        document.getElementById('res').innerHTML=h+'</table>';
    });
}
</script>
{% endblock %}
