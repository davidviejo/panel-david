{% extends "base.html" %}
{% block title %}Schema{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🧬 Schema Extractor</h2>
    <textarea id="u" class="form-control mb-2" rows="5"></textarea>
    <button onclick="run()" class="btn btn-dark">Extraer</button>
    <button onclick="dl()" class="btn btn-success">Excel</button>
    <div id="res" class="mt-3"></div>
</div>
<script>
let cd=[];
function run(){
    fetch('/api/v1/schema_tool/scan', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls:document.getElementById('u').value.split('\n')})})
    .then(r=>r.json()).then(d=>{
        cd=d.data;
        let h='';
        d.data.forEach(i=>{ h += `<div class="card mb-2 p-2"><b>${i.url}</b><br>Types: <span class="text-primary">${i.types.join(', ')}</span></div>`; });
        document.getElementById('res').innerHTML=h;
    });
}
function dl(){
    fetch('/api/v1/schema_tool/download', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({data:cd})})
    .then(r=>r.blob()).then(b=>{const u=window.URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download="schema.xlsx";a.click();});
}
</script>
{% endblock %}
