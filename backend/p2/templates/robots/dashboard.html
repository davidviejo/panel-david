{% extends "base.html" %}
{% block title %}Robots{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🤖 Robots.txt Tester</h2>
    <textarea id="u" class="form-control mb-3" rows="5" placeholder="URLs a comprobar..."></textarea>
    <button onclick="run()" class="btn btn-primary">Test Googlebot Access</button>
    <div id="res" class="mt-3"></div>
</div>
<script>
function run(){
    const u = document.getElementById('u').value.split('\n');
    fetch('/api/v1/robots/check', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls:u})})
    .then(r=>r.json()).then(d=>{
        let h = '<ul class="list-group">';
        d.data.forEach(i=>{
            let c = i.can_fetch?'text-success':'text-danger';
            let icon = i.can_fetch?'✅':'⛔';
            h += `<li class="list-group-item d-flex justify-content-between"><span>${i.url}</span><strong class="${c}">${icon} ${i.status}</strong></li>`;
        });
        document.getElementById('res').innerHTML=h+'</ul>';
    });
}
</script>
{% endblock %}
